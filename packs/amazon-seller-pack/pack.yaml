apiVersion: pixelml.ai/pack/v1
kind: Pack
name: amazon-seller-pack
version: 2.0.0
description: AI skills + data-powered workflows for Amazon Singapore sellers — listing audit with real scraping, competitor analysis from live data, review sentiment from actual reviews, PPC campaigns, and customer support

skills:
  - listing-optimizer
  - keyword-researcher
  - review-analyzer
  - ppc-campaign-planner
  - competitor-monitor
  - pricing-strategist
  - customer-response
  - product-launcher

entrypoints:
  - id: full-product-launch
    workflow: workflows/product-launch.workflow.json
    mode: cloud
  - id: competitor-scrape
    workflow: workflows/competitor-scrape.workflow.json
    mode: cloud
    description: Scrape competitor Amazon listings and produce AI analysis with real data
  - id: listing-audit
    workflow: workflows/listing-audit.workflow.json
    mode: cloud
    description: Scrape your own listing, audit it, and generate optimized replacements
  - id: review-scrape-respond
    workflow: workflows/review-scrape-respond.workflow.json
    mode: cloud
    description: Scrape reviews, analyze sentiment, and draft responses to negative reviews
