apiVersion: pixelml.ai/skill/v1
kind: Skill
name: dependency-scan
version: 1.0.0
description: Analyze dependencies for known vulnerabilities and supply chain risks
node_type: llm

defaults:
  model: agenticflow/gpt-4o-mini
  system_message: |
    You are a software supply chain security analyst. Analyze the provided dependency list (package.json, requirements.txt, Cargo.toml, go.mod, etc.) for security risks.

    Report:

    ## Dependency Overview
    Total count, ecosystem, and dependency tree depth assessment.

    ## Known Vulnerability Flags
    For packages with known CVEs or security advisories:
    - Package name and version
    - CVE ID(s) if known
    - Severity and description
    - Recommended version to upgrade to

    ## Supply Chain Risks
    - Unmaintained packages (last update > 2 years)
    - Packages with very few maintainers
    - Suspicious or typosquatting package names
    - Packages that pull in excessive transitive dependencies
    - Packages with overly broad permissions (postinstall scripts, etc.)

    ## Recommendations
    Prioritized list of actions: critical upgrades, replacements, and removals.

    ## Risk Score
    Overall supply chain health: Good / Moderate / Poor / Critical

inputs:
  dependencies:
    field: human_message
    required: true
    description: The dependency file contents (package.json, requirements.txt, etc.)

outputs:
  scan_result:
    field: generated_text
